<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UI 퍼블리싱 가이드</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/compotents.css">
    <link rel="stylesheet" href="./guide.css">

    <script src="../js//plugin/jquery-4.0.0.min.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/style.js"></script>

</head>
<body>

    <section id="sec-buttons" class="page-section">
        <h2 class="section-title">버튼 (Buttons)</h2>
        <div class="content-card">
            <p style="font-size: 1.1rem; margin-bottom: 16px;">버튼 타입 & 상태</p>
            <div class="btn-group">
                <button type="button" class="btn-item btn-primary">Primary Button</button>
                <button type="button" class="btn-item btn-secondary">secondary Button</button>
                <button type="button" class="btn-item btn-outline">Outline Button</button>
                <button type="button" class="btn-item btn-primary" disabled>Disabled</button>
            </div>
            
            <p style="font-size: 1.1rem; margin-bottom: 16px; margin-top: 30px;">버튼 사이즈</p>
            <div class="button-area" style="align-items: center;">
                <button type="button" class="btn-item btn-primary btn-sm">Small (sm)</button>
                <button type="button" class="btn-item btn-primary">Medium (기본)</button>
                <button type="button" class="btn-item btn-primary btn-lg">Large (lg)</button>
            </div>
            <div class="button-area mt-10" style="align-items: center;">
                <button type="button" class="btn-item btn-secondary btn-sm">Small (sm)</button>
                <button type="button" class="btn-item btn-secondary">Medium (기본)</button>
                <button type="button" class="btn-item btn-secondary btn-lg">Large (lg)</button>
            </div>
            
            <p style="font-size: 1.1rem; margin-bottom: 16px; margin-top: 30px;">블록 버튼</p>
            <button type="button" class="btn-item btn-outline btn-block">Block Button (width: 100%)</button>
            <p class="mt-10"></p>
            <button type="button" class="btn-item btn-outline btn-block  justify-start">Block Button (width: 100%)</button>
            <p class="mt-10"></p>
            <button type="button" class="btn-item btn-outline btn-block  justify-end">Block Button (width: 100%)</button>
            <p class="mt-10"></p>
            <div class="button-area">
                <button type="button" class="btn-item btn-primary">Block Button (width: 100%)</button>
                <button type="button" class="btn-item btn-primary">Block Button (width: 100%)</button>
            </div>
            <p class="mt-10"></p>
            <div class="button-area tp-2">
                <button type="button" class="btn-item btn-outline btn-block">Block Button (width: 20%)</button>
                <button type="button" class="btn-item btn-outline btn-block">Block Button (width: 80%)</button>
            </div>
            <p class="mt-10"></p>
            <div class="button-area tp-3">
                <button type="button" class="btn-item btn-outline btn-block">Block Button (width: 30%)</button>
                <button type="button" class="btn-item btn-outline btn-block">Block Button (width: 70%)</button>
            </div>
            <p class="mt-10"></p>
            <div class="button-area tp-4">
                <button type="button" class="btn-item btn-outline btn-block">Block Button (width: 40%)</button>
                <button type="button" class="btn-item btn-outline btn-block">Block Button (width: 60%)</button>
            </div>
            <p class="mt-10"></p>
            <div class="button-area tp-6">
                <button type="button" class="btn-item btn-outline btn-block">Block Button (width: 60%)</button>
                <button type="button" class="btn-item btn-outline btn-block">Block Button (width: 40%)</button>
            </div>
            <p class="mt-10"></p>
            <div class="button-area tp-7">
                <button type="button" class="btn-item btn-outline btn-block">Block Button (width: 70%)</button>
                <button type="button" class="btn-item btn-outline btn-block">Block Button (width: 30%)</button>
            </div>
            <p class="mt-10"></p>
            <div class="button-area tp-8">
                <button type="button" class="btn-item btn-outline btn-block">Block Button (width: 80%)</button>
                <button type="button" class="btn-item btn-outline btn-block">Block Button (width: 20%)</button>
            </div>
        </div>
    </section>
</body>
</html>
