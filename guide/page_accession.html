<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>회원가입</title>
    <link rel="stylesheet" href="../assets/scss/common.css" />
    <link rel="stylesheet" href="../assets/scss/layout.css" />
    <link rel="stylesheet" href="../assets/scss/components.css" />
    
    <script src="../assets/js/plugin/jquery-4.0.0.min.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/style.js"></script>

    <body>
        <form action="">
            <div class="body-field main">
                <div class="header-area">
                    <div class="header__title">
                        <h2>사용자 확인</h2>
                    </div>
                </div>
                <div class="content-area main">

                            <dl class="info-item__row">
                                <dt class="info-item__label">소속</dt>
                                <dt class="info-item__content">
                                    <strong>BNK부산은행</strong>
                                    <span>총무부 김부산 과장</span>
                                </dt>
                            </dl>
                        </div>
                    </div>
                </div>
                <div class="footer-area main">
                    <div class="button-area">
                        <button type="button" class="btn-item btn-primary btn-block">로그인</button>
                    </div>
                </div>
            </div>

        </form>
