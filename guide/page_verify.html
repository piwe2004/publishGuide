<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>회원가입</title>
    <link rel="stylesheet" href="../assets/scss/common.css" />
    <link rel="stylesheet" href="../assets/scss/layout.css" />
    <link rel="stylesheet" href="../assets/scss/components.css" />
    
    <script src="../assets/js//plugin/jquery-4.0.0.min.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/style.js"></script>


    <!-- 가이드 페이지 전용 css -->
    <link rel="stylesheet" href="./guide.css" />
    </head>
    <body>
        <form action="">
            <div class="body-field main">
                <div class="header-area">
                    <div class="header__side--left">
                    <button type="button" aria-label="뒤로가기">
                        <img src="../assets/images/icon_back_b.svg" alt="">
                    </button>
                    </div>
                    <div class="header__title">
                    <h2>사용자 확인</h2>
                    </div>
                    <div class="header__side--right"></div>
                </div>
                <div class="content-area main">
                    <div class="verift-field">
                        <div class="user-card tp-group">
                            <div class="user-card__company">
                                <img src="../assets/images/bnkLogo_00.svg" alt="bnk금융지주">
                            </div>
                            <div class="user-card__picture">
                                <img src="" alt="">
                            </div>
                            <div class="user-card__info">
                                <p class="card-info__name">김부산</p>
                                <p class="card-info__dept">
                                    디지털전략부
                                    <span class="card-info__rank">과장</span>
                                </p>
                            </div>
                            <div class="user-card__date">
                                <p class="card-date__title">출입증 유효기간</p>
                                <p class="card-date__day">2026.12.12까지</p>
                            </div>
                            <div class="user-card__footer">
                                <p class="user-card__text">위 사람은 당사 직원임을 증명함</p>
                                <img src="../assets/images/icon_seal.svg" alt="부산은행장직인">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="footer-area main">
                    <button type="button" class="btn-item btn-primary btn-block">다음</button>
                </div>
            </div>

        </form>
    </body>
</html>
