<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UI 퍼블리싱 가이드</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="./guide.css">

    <script src="../js//plugin/jquery-4.0.0.min.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/style.js"></script>

</head>
<body>
    <div class="agree-field">
        <div class="agree-field__top step-box">
            <p class="agree-field__top step-box__left">약관동의</p>
            <div class="step-box__right">
                <div class="step-box__right--line step_1"></div>
                <p class="step-box__right--text">1/3</p>
            </div>
        </div>
        <div class="agree-field__list">
            <div class="agree-box">
                <button class="agree-label" type="button" aria-label="필수 약관내용 팝업창 열림">(필수)전체동의</button>
            </div>
            <div class="agree-box list-type">
                <div class="agree-box__none-line">
                    <button class="agree-label list-button ar__down" type="button" aria-expanded="false" aria-label="하위 약관">(필수) KCB 이용을 위한 약관</button>
                </div>
                <div class="agree-box__list">
                    <ul class="agree-box__list--inner">
                        <li class="agree-box__list-item">
                            <input type="checkbox" name="checkItem1" id="checkItem1" tabindex="-1" aria-label="[필수]서비스 이용약관 동의">
                            <button class="agree-label ar__right" type="button" aria-haspopup="dialog">[필수]서비스 이용약관 동의</button>
                        </li>
                        <li class="agree-box__list-item">
                            <input type="checkbox" name="checkItem2" id="checkItem2" tabindex="-1" aria-label="[필수]서비스 이용약관 동의">
                            <button class="agree-label ar__right" type="button" aria-haspopup="dialog">[필수]서비스 이용약관 동의</button>
                        </li>
                        <li class="agree-box__list-item">
                            <input type="checkbox" name="checkItem" id="checkItem3" tabindex="-1" aria-label="[필수]서비스 이용약관 동의">
                            <button class="agree-label ar__right" type="button" aria-haspopup="dialog">[필수]서비스 이용약관 동의</button>
                        </li>
                        <li class="agree-box__list-item">
                            <input type="checkbox" name="checkItem" id="checkItem4" tabindex="-1" aria-label="[필수]서비스 이용약관 동의">
                            <button class="agree-label ar__right" type="button" aria-haspopup="dialog">[필수]서비스 이용약관 동의</button>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="agree-box list-type">
                <div class="agree-box__none-line">
                    <button class="agree-label list-button ar__down" type="button" aria-expanded="false" aria-label="하위 약관">(필수) KCB 이용을 위한 약관</button>
                </div>
                <div class="agree-box__list list-open">
                    <ul class="agree-box__list--inner">
                        <li class="agree-box__list-item">
                            <input type="checkbox" name="checkItem1" id="checkItem1" tabindex="-1" aria-label="[필수]서비스 이용약관 동의">
                            <button class="agree-label ar__right" type="button" aria-haspopup="dialog">[필수]서비스 이용약관 동의</button>
                        </li>
                        <li class="agree-box__list-item">
                            <input type="checkbox" name="checkItem2" id="checkItem2" tabindex="-1" aria-label="[필수]서비스 이용약관 동의">
                            <button class="agree-label ar__right" type="button" aria-haspopup="dialog">[필수]서비스 이용약관 동의</button>
                        </li>
                        <li class="agree-box__list-item">
                            <input type="checkbox" name="checkItem" id="checkItem3" tabindex="-1" aria-label="[필수]서비스 이용약관 동의">
                            <button class="agree-label ar__right" type="button" aria-haspopup="dialog">[필수]서비스 이용약관 동의</button>
                        </li>
                        <li class="agree-box__list-item">
                            <input type="checkbox" name="checkItem" id="checkItem4" tabindex="-1" aria-label="[필수]서비스 이용약관 동의">
                            <button class="agree-label ar__right" type="button" aria-haspopup="dialog">[필수]서비스 이용약관 동의</button>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="agree-box">
                <input type="checkbox" name="agree2" id="agree2"  tabindex="-1" aria-label="(필수) 모바일 출입증 서비스 이용을 위한 약관">
                <button class="agree-label ar__right" type="button" aria-haspopup="dialog">(필수) 모바일 출입증 서비스 이용을 위한 약관</button>
            </div>
        </div>
    </div>
</body>
</html>
