    <body>
        <form action="">
            <div class="body-field main">
                <div class="content-area main">
                    <div class="box-column">
                        <p class="box-column__title">BNK모바일 출입증</p>
                        <div class="login-pass">
                            <p class="login-pass__text">간편비밀번호 6자리 입력</p>
                            <div class="otp-input__box">
                                <input type="text" class="otp-input__item" name="otp_number" id="otp_number1" aria-label="인증번호 1번째 자리" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                                <input type="text" class="otp-input__item" name="otp_number" id="otp_number2" aria-label="인증번호 2번째 자리" maxlength="1" inputmode="numeric" pattern="[0-9]*">

                                <input type="text" class="otp-input__item" name="otp_number" id="otp_number5" aria-label="인증번호 5번째 자리" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                                <input type="text" class="otp-input__item" name="otp_number" id="otp_number6" aria-label="인증번호 6번째 자리" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </form>
