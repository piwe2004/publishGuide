<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UI 퍼블리싱 가이드</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/components.css">

    <!-- 가이드 페이지를 위한 css -->
    <link rel="stylesheet" href="./guide.css">
    
    <style>
        #guide-frame{
            width: 100%;
            height:100%;
            border:none;
            display: block;
        }
    </style>

</head>
<body>

    <!-- SVG Icons Definition -->
    <svg style="display:none;">
        <symbol id="icon-bell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </symbol>
        <symbol id="icon-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>
        </symbol>
        <symbol id="icon-back" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </symbol>
        <symbol id="icon-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>
        </symbol>
        <symbol id="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
        </symbol>
    </svg>

    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>UI/UX가이드</h1>
            </div>
            <ul class="nav-menu">
                <li><button type="button" class="nav-btn is-active" data-target="guide_header">헤더 (Headers)</button></li>
                <li><button type="button" class="nav-btn" data-target="guide_button">버튼 (Buttons)</button></li>
                <li><button type="button" class="nav-btn" data-target="guide_form">폼 요소 (Forms)</button></li>
                <li><button type="button" class="nav-btn" data-target="guide_layer">레이어 & 팝업</button></li>
                <li><button type="button" class="nav-btn" data-target="guide_dialogs">다이얼로그 (Dialogs)</button></li>
                <li><button type="button" class="nav-btn" data-target="guide_toast">토스트 (Toast)</button></li>
                <li><button type="button" class="nav-btn" data-target="guide_loading">로딩 & 스켈레톤</button></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <iframe id="guide-frame" src="./guide_layer.html" ></iframe>
        </main>
    </div>

    <script>
        const navBtn = document.querySelectorAll(".nav-btn");
        const frame = document.getElementById('guide-frame');
        let nevTarget = "";

        navBtn.forEach(x=>{
            x.addEventListener("click", function(e){
                navBtn.forEach(a=>a.classList.remove("is-active"));
                nevTarget = e.currentTarget.dataset.target;
                frame.setAttribute("src", `./${nevTarget}.html`);
                e.currentTarget.classList.add("is-active");
            });
        })

        // iframe의 내용이 다 로드된 후 실행
        frame.onload = function() {
            try {
                // 1. iframe 내부의 document 객체 접근
                const frameDoc = frame.contentDocument || frame.contentWindow.document;

                // 2. sub.html에서 원하는 태그 선택 (예: #target)
                const targetTag = frameDoc.getElementById('target');

                if (targetTag) {
                    // 3. 태그 복사해서 메인 페이지에 넣기
                    const clone = targetTag.cloneNode(true);
                    document.getElementById('display-area').appendChild(clone);
                }
            } catch (e) {
                console.error("로컬 보안 정책으로 인해 접근이 차단되었을 수 있습니다.", e);
            }
        };
    </script>
</body>
</html>
