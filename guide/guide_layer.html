<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UI 퍼블리싱 가이드</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/compotents.css">
    <link rel="stylesheet" href="./guide.css">

    <script src="../js//plugin/jquery-4.0.0.min.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/style.js"></script>
</head>
<body>

    <!-- 임시 svg -->
    <svg style="display:none;">
        <symbol id="icon-bell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </symbol>
        <symbol id="icon-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>
        </symbol>
        <symbol id="icon-back" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </symbol>
        <symbol id="icon-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>
        </symbol>
        <symbol id="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
        </symbol>
    </svg>

    <section id="sec-popup" class="page-section">
        <h2 class="section-title">레이어 & 팝업</h2>
        <div class="content-card">
            <p style="margin-bottom: 20px; color: var(--text-sub);">
                화면 내에서 추가적인 정보를 보여주거나 입력을 받을 때 사용하는 모달 컴포넌트입니다.
            </p>
            <div class="btn-group">
                <button type="button" class="btn-item btn-primary" onclick="UI.popup.open('layer1')">일반 레이어 팝업</button>
                <button type="button" class="btn-item btn-outline" onclick="UI.popup.open('full1')">풀 팝업 (전체화면)</button>
                <button type="button" class="btn-item btn-outline" onclick="UI.popup.open('full2')">풀 팝업 (하단버튼)</button>
                <button type="button" class="btn-item btn-secondary" onclick="UI.popup.open('bottom1')">바텀 시트</button>
            </div>
        </div>
    </section>
    </div>


    <!-- [1] Layer Popup -->
    <div id="layer1" class="layer-field" data-dim-close="true" role="dialog" aria-modal="true">
        <div class="layer-dim"></div>
        <div class="layer-sheet">
            <div class="header-area tp-layer justify-end">
                <div class="header__side--right">
                    <button type="button" aria-label="닫기" onclick="UI.popup.close('layer1')">
                        <svg><use href="#icon-close"></use></svg>
                    </button>
                </div>
            </div>
            <div class="content-area tp-layer">
                <p>가장 일반적인 형태의 중앙 정렬 레이어 팝업입니다.</p>
                <br>
                <p>배경(Dim)을 클릭하면 닫히도록 설정되어 있습니다. (data-dim-close="true")</p>
            </div>
            <div class="footer-area tp-layer">
                <div class="button-area">
                    <button type="button" class="btn-item btn-secondary" onclick="UI.popup.close('layer1')">닫기</button>
                    <button type="button" class="btn-item btn-primary" onclick="UI.popup.close('layer1')">확인</button>
                </div>
            </div>
        </div>
    </div>

    <!-- [2-1] Full Popup -->
    <div id="full1" class="layer-field l-full" role="dialog" aria-modal="true">
        <div class="layer-sheet">
            <div class="header-area tp-layer justify-end">
                <div class="header__side--right">
                    <button type="button" aria-label="닫기" onclick="UI.popup.close('full1')">
                        <svg><use href="#icon-close"></use></svg>
                    </button>
                </div>
            </div>
            <div class="content-area tp-layer">
                <p>화면 전체를 덮는 풀 팝업입니다.</p>
            </div>
        </div>
    </div>

    <!-- [2-2] Full Popup -->
    <div id="full2" class="layer-field l-full" role="dialog" aria-modal="true">
        <div class="layer-sheet">
            <div class="header-area tp-layer">
                <div class="header__side--left">
                </div>
                <div class="header__title">
                    <h4>약관상세보기</h4>
                </div>
                <div class="header__side--right">
                    <button type="button" aria-label="닫기" onclick="UI.popup.close('full2')">
                        <svg><use href="#icon-close"></use></svg>
                    </button>
                </div>
            </div>
            <div class="content-area tp-layer">
                <div class="contract-box">
                    <ul class="contract-box__tabs">
                        <li>
                            <button type="button" class="contract-tab" aria-selected="true" data-contractId="test1">약관1</button>
                        </li>
                        <li>
                            <button type="button" class="contract-tab" aria-selected="false" data-contractId="test2">약관2</button>
                        </li>
                        <li>
                            <button type="button" class="contract-tab" aria-selected="false" data-contractId="test3">약관3</button>
                        </li>
                        <li>
                            <button type="button" class="contract-tab" aria-selected="false" data-contractId="test4">약관4</button>
                        </li>
                    </ul>
                    <div class="contract-box__pages">
                        <div class="pdf-viewer" aria-hidden="false" data-contract="test1">
                            <div style="height:2000px">PDF영역1</div>
                        </div>
                        <div class="pdf-viewer" aria-hidden="true" data-contract="test2">PDF영역2</div>
                        <div class="pdf-viewer" aria-hidden="true" data-contract="test3">PDF영역3</div>
                        <div class="pdf-viewer" aria-hidden="true" data-contract="test4">PDF영역4</div>
                    </div>
                </div>
            </div>
            <div class="footer-area tp-layer">
                <div class="button-area">
                    <button type="button" class="btn-item btn-secondary" onclick="UI.popup.close('full2')">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- [3] Bottom Sheet -->
    <div id="bottom1" class="layer-field l-bottom" data-dim-close="true" role="dialog" aria-modal="true">
        <div class="layer-dim"></div>
        <div class="layer-sheet">
            <div class="layer-sheet__handle"></div>
            <div class="header-area tp-layer">
                <div class="header__title">
                    <h4>약관상세보기</h4>
                </div>
                <div class="header__side--right">
                    <button type="button" aria-label="닫기" onclick="UI.popup.close('bottom1')">
                        <svg><use href="#icon-close"></use></svg>
                    </button>
                </div>
            </div>
            <div class="content-area">
                <ul class="select-list" role="listbox" aria-label="OOO 선택항목">
                    <li class="select-list__item" role="option" aria-selected="false">
                        <button type="button" class="btn-item" onclick="UI.popup.close('bottom1');">옵션 1 선택</button>
                    </li>
                    <li class="select-list__item" role="option" aria-selected="false">
                        <button type="button" class="btn-item" onclick="UI.popup.close('bottom1');">옵션 2 선택</button>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
