<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UI 퍼블리싱 가이드</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/compotents.css">
    <link rel="stylesheet" href="./guide.css">

    
    <script src="../js//plugin/jquery-4.0.0.min.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/style.js"></script>

</head>
<body>

    <svg style="display:none;">
        <symbol id="icon-bell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </symbol>
        <symbol id="icon-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>
        </symbol>
        <symbol id="icon-back" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </symbol>
        <symbol id="icon-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>
        </symbol>
        <symbol id="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
        </symbol>
    </svg>


    <section id="sec-form" class="page-section">
        <h2 class="section-title">폼 (Form)</h2>
        <div class="content-card">
            <p style="font-size: 1.1rem; margin-bottom: 16px;">BASIC INPUT</p>
            <div class="input-field" tabindex="0">
                <div class="input-field__box tp-input">
                    <label for="input1" class="input-box__label">이름</label>
                    <div class="input-box__inner" aria-hidden="true">
                        <input type="text" class="input-box__item" name="input1" id="input1" required>
                    </div>
                </div>
            </div>

            <p style="font-size: 1.1rem; margin: 16px 0;">INFO INPUT</p>
            <div class="input-field" tabindex="0">
                <div class="input-field__box tp-input">
                    <label for="input2" class="input-box__label">이름</label>
                    <div class="input-box__inner" aria-hidden="true">
                        <input type="text" class="input-box__item" name="input2" id="input2" required>
                    </div>
                </div>
                <p class="input-field__text">비밀번호는 대문자 소문자 특수문자....</p>
            </div>

            <p style="font-size: 1.1rem; margin: 16px 0;">ERROR INPUT</p>
            <div class="input-field is-error" tabindex="0">
                <div class="input-field__box tp-input">
                    <label for="input3" class="input-box__label">이름</label>
                    <div class="input-box__inner" aria-hidden="true">
                        <input type="text" class="input-box__item" name="input3" id="input3" required>
                    </div>
                </div>
                <p class="input-field__text">테스트 테스트</p>
            </div>

            <p style="font-size: 1.1rem; margin: 16px 0;">필수 INPUT</p>
            <div class="input-field" tabindex="0">
                <div class="input-field__box tp-input">
                    <label for="inputrequired" class="input-box__label is-required">이름</label>
                    <div class="input-box__inner" aria-hidden="true" required aria-required="true">
                        <input type="text" class="input-box__item" name="inputrequired" id="inputrequired" required>
                    </div>
                </div>
            </div>

            <p style="font-size: 1.1rem; margin-bottom: 16px; margin-top: 30px;">다중 INPUT</p>

            <!-- input-field모음 -->
            <div class="input-area">
                <div class="input-field" tabindex="0">
                    <div class="input-field__box tp-input">
                        <label for="input4" class="input-box__label">주민등록번호</label>
                        <div class="input-box__inner" aria-hidden="true">
                            <input type="text" class="input-box__item user-number" inputmode="numeric" pattern="[0-9]*" maxlength="6" name="input4" id="input4" required>
                            <span>-</span>
                            <input type="text" class="input-box__item user-number" inputmode="numeric" pattern="[0-9]*" maxlength="7" name="input5" id="input5" required>
                        </div>
                    </div>
                </div>
                <div class="input-field tp-select" tabindex="0" data-select-field="select1">
                    <div class="input-field__box">
                        <p class="input-box__label">통신사</p>
                        <div class="input-box__inner" aria-hidden="true">
                            <input type="hidden" class="input-box__item select-value" />
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <div id="select1" class="layer-field l-bottom is-active is-visible" data-dim-close="true" role="dialog" aria-modal="true">
        <div class="layer-dim"></div>
        <div class="layer-sheet">
            <div class="layer-sheet__handle"></div>
            <div class="header-area tp-layer">
                <div class="header__title">
                    <h4 id="bottom-title">통신사 선택</h4>
                </div>
                <div class="header__side--right">
                    <button type="button" aria-label="닫기" onclick="UI.popup.close('select1')">
                        <svg><use href="#icon-close"></use></svg>
                    </button>
                </div>
            </div>
            <div class="content-area">
                <ul class="select-list" data-select-list="select1" role="listbox" aria-label="OOO 선택항목"></ul>
            </div>
        </div>
    </div>
    
    <div id="bottom-telecom" class="ui-popup popup-bottom" data-dim-close="true" role="dialog" aria-modal="true" aria-labelledby="bottom-telecom-title">
        <div class="layer-dim" aria-hidden="true"></div>
        <div class="popup-inner" tabindex="-1">
            <div class="bottom-handle" aria-hidden="true"></div>
            <div class="popup-header">
                <h3 id="bottom-telecom-title">통신사 선택</h3>
                <button type="button" class="btn-close" onclick="UI.popup.close('bottom-telecom')" aria-label="팝업 닫기">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px; height:24px;" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="popup-body">
                <ul style="display: flex; flex-direction: column; gap: 10px;">
                    <li><button type="button" class="btn btn-outline btn-block" >SKT</button></li>
                    <li><button type="button" class="btn btn-outline btn-block">KT</button></li>
                    <li><button type="button" class="btn btn-outline btn-block">LGU+</button></li>
                    <li><button type="button" class="btn btn-outline btn-block">알뜰폰</button></li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const testOption = [
            {value:"1", text:"1"},
            {value:"2", text:"2"},
            {value:"3", text:"3"},
            {value:"4", text:"4"},
            {value:"5", text:"5"},
        ]
        UI.select("select1", testOption).then(()=>{
            console.log("셀렉트박스 선택완료");
        });
    </script>
</body>
</html>
