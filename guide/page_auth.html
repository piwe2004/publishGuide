<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>회원가입</title>
    <link rel="stylesheet" href="../assets/scss/common.css" />
    <link rel="stylesheet" href="../assets/scss/layout.css" />
    <link rel="stylesheet" href="../assets/scss/components.css" />
    
    <script src="../assets/js//plugin/jquery-4.0.0.min.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/style.js"></script>


    <!-- 가이드 페이지 전용 css -->
    <link rel="stylesheet" href="./guide.css" />
    </head>
    <body>
        <form action="">
            <div class="body-field main">
                <div class="header-area">
                    <div class="header__side--left">
                    <button type="button" aria-label="뒤로가기">
                        <img src="../assets/images/icon_back_b.svg" alt="">
                    </button>
                    </div>
                    <div class="header__title">
                    <h2>간편인증 등록</h2>
                    </div>
                    <div class="header__side--right">
                        <button type="button" aria-label="닫기">
                            <img src="../assets/images/icon_close_b.svg" alt="">
                        </button>
                    </div>
                </div>
                <div class="content-area main">
                    <div class="box-column">
                        <div class="box-column__logo"></div>
                        <p class="box-column__title">지문인증</p>
                        <p class="box-column__text">
                            간편 로그인을 위해<br/>간편인증 정보를 등록하시겠어요?
                        </p>
                    </div>
                </div>
                <div class="footer-area main">
                    <div class="button-area tp-3">
                        <button type="button" class="btn-item btn-secondary btn-block">다음에</button>
                        <button type="button" class="btn-item btn-primary btn-block">등록하기</button>
                    </div>
                </div>
            </div>


        </form>
    </body>
</html>
